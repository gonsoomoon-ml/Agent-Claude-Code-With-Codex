<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>매일 AI 브리핑 — 검증 후 발행</title>
    <style>
      /* 웜 잉크 다크 테마 — 팔레트의 단일 원천(single source of truth).
         전 컴포넌트는 인라인 스타일에서 var(--…) 로 이 토큰을 참조한다. */
      :root {
        --bg: #191410;          /* 전역 배경(웜 잉크) */
        --panel: #31261c;       /* 카드·모달·샘플 메일 프레임 — 다크 elevation 상향(카드가 배경 위로 뜨도록) */
        --panel-2: #3a2d20;     /* 살짝 밝은 칩(아바타·비활성 버튼) — panel 위 단계 유지 */
        --border: #4d3d2e;      /* 보더 — 카드 엣지가 묻히지 않게 동반 상향 */
        --text: #efe7de;        /* 제목·강조 */
        --text-body: #d8cdc0;   /* 본문(밝게) */
        --text-dim: #b3a596;    /* 라벨·보조 */
        --coral-from: #FF9E80;
        --coral-to: #FF6B47;
        --coral-ink: #1A0F0A;
        --coral-wash: rgba(255, 107, 71, 0.14);  /* 선택 카드 배경(다크용으로 상향) */
        --danger: #ff8a80;
        color-scheme: dark;     /* 네이티브 위젯·스크롤바도 다크로 */
      }
      html { background: var(--bg); }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text-body);
        -webkit-font-smoothing: antialiased;
      }
      h1, h2, h3, strong { color: var(--text); }
      a { color: var(--coral-to); }
      input, select, textarea { accent-color: var(--coral-to); }
      input[type="email"], input[type="text"] {
        background: var(--panel); color: var(--text);
        border: 1px solid var(--border); border-radius: 8px;
      }
      input::placeholder { color: var(--text-dim); }
      button { background: var(--panel); color: var(--text); border: 1px solid var(--border); }

      .cta-coral { transition: all .15s; }
      .cta-coral:hover:not([disabled]) {
        filter: brightness(1.08);
        box-shadow: 0 0 24px rgba(255, 107, 71, 0.45);
        transform: translateY(-1px);
      }
      .cta-coral[disabled] > [aria-hidden] { display: none; }
      .cta-ghost:hover {
        border-color: var(--coral-to);
        color: var(--text);
        background: rgba(255, 255, 255, 0.04);
      }
      .src-card { transition: border-color .12s, background .12s; }
      .src-card:hover { border-color: var(--coral-to); }
      .src-card:focus-within { outline: 2px solid var(--coral-to); outline-offset: 2px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
