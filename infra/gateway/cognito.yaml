AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  브리핑 ① Gateway 승격 — Cognito(CUSTOM_JWT 방식의 M2M 인증)와 IAM 역할(Gateway·Lambda)을 선언적으로 만든다(재현 가능).
  aiops 의 infra/cognito-gateway/cognito.yaml 을 미러. Gateway·target·OAuth2 provider 는 deploy_gateway.py(boto3)가 만든다.

Parameters:
  DemoUser:
    Type: String
    Default: gonsoo
    Description: 리소스 이름에 붙는 접두사(사용자별로 격리한다)
  LambdaName:
    Type: String
    Default: briefing-gw-handler
    Description: Gateway 의 MCP 타깃 Lambda(zip) 이름 — deploy_gateway.py 가 이 이름으로 만든다. 아래 Gateway 역할이 이 Lambda 에 invoke 권한을 준다.
  SourceTable:
    Type: String
    Default: briefing-source-store
    Description: get_source 도구가 읽는 DDB source-store 테이블 이름

Resources:
  # ── Cognito — 기계 간 인증(M2M client_credentials)으로 토큰을 발급하고, Gateway 가 CUSTOM_JWT 로 검증한다 ──
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub 'briefing-gw-${DemoUser}-userpool'
      MfaConfiguration: 'OFF'
      AdminCreateUserConfig: {AllowAdminCreateUserOnly: true}
      Policies:
        PasswordPolicy: {MinimumLength: 8, RequireLowercase: false, RequireNumbers: false, RequireSymbols: false, RequireUppercase: false}

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref UserPool
      Domain: !Sub 'briefing-gw-${DemoUser}-${AWS::AccountId}'   # Cognito 도메인은 전역에서 유일해야 해서 계정 id 를 붙인다

  ResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      UserPoolId: !Ref UserPool
      Identifier: !Sub 'briefing-gw-${DemoUser}'
      Name: 'Gateway Invoke'
      Scopes:
        - {ScopeName: invoke, ScopeDescription: Invoke briefing gateway tools}

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: ResourceServer
    Properties:
      ClientName: !Sub 'briefing-gw-${DemoUser}-client'
      UserPoolId: !Ref UserPool
      GenerateSecret: true                     # M2M 클라이언트는 secret 이 필요. ClientSecret 은 CFN output 에 없어 describe API 로 따로 조회한다
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows: [client_credentials]
      AllowedOAuthScopes: [!Sub 'briefing-gw-${DemoUser}/invoke']
      SupportedIdentityProviders: [COGNITO]

  # ── IAM: Lambda 실행 역할 — get_source 의 DDB 읽기 + CloudWatch logs ──
  LambdaExecRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'briefing-gw-${DemoUser}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement: [{Effect: Allow, Principal: {Service: lambda.amazonaws.com}, Action: sts:AssumeRole}]
      ManagedPolicyArns: ['arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole']
      Policies:
        - PolicyName: source-store-read
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [dynamodb:GetItem, dynamodb:Query]
                Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${SourceTable}'

  # ── IAM: Gateway 실행 역할 — ★ trust principal 은 bedrock-agentcore, 권한은 타깃 Lambda invoke 뿐(최소권한) ──
  GatewayIamRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'briefing-gw-${DemoUser}-gateway-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement: [{Effect: Allow, Principal: {Service: bedrock-agentcore.amazonaws.com}, Action: sts:AssumeRole}]
      Policies:
        - PolicyName: invoke-handler-lambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${LambdaName}'

Outputs:
  UserPoolId: {Value: !Ref UserPool}
  Domain: {Value: !Ref UserPoolDomain}
  ClientId: {Value: !Ref UserPoolClient}
  Scope: {Value: !Sub 'briefing-gw-${DemoUser}/invoke'}
  GatewayIamRoleArn: {Value: !GetAtt GatewayIamRole.Arn}
  LambdaExecRoleArn: {Value: !GetAtt LambdaExecRole.Arn}
