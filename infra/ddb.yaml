AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  브리핑 에이전트 영속 계층 — card-cache(재계산 방지) · source-store(정본) · ledger(시간·사용자 history) · users(프로필).
  전부 PAY_PER_REQUEST(프로비저닝 0 → idle ≈ $0, 요청당 과금). 로컬 backend 와 *같은 Protocol* 을 DDB 가 만족.
  내구성: cache 30일·source 7일 TTL(ephemeral) / ledger·users 는 durable(TTL 없음 + DeletionPolicy:Retain + PITR).

Parameters:
  TablePrefix:
    Type: String
    Default: briefing
    Description: 테이블 이름 접두사 (briefing → briefing-card-cache / briefing-ledger)

Resources:
  # ── card cache: 같은 (source, lens, skill, model) 재계산 방지. content-addressed 키. ──
  CardCacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-card-cache'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: cache_key          # = sha256(source_id|lens|skill|author_model_id)
          AttributeType: S
      KeySchema:
        - AttributeName: cache_key
          KeyType: HASH
      TimeToLiveSpecification:               # 캐시는 disposable → 30일 자동 만료(스토리지·정합 부담↓)
        AttributeName: ttl
        Enabled: true

  # ── ledger: "언제·누구에게·무엇을 발행했나" 장부. weekly summary·Diff-Since-Last 의 토대. ──
  LedgerTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain          # durable — 스택을 지워도 원장/데이터는 보존(내구성 의도 = 보호)
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${TablePrefix}-ledger'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:   # 우발적 쓰기/삭제/손상 복구(연속 백업, 최근 35일)
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: user_id             # 사용자 파티션
          AttributeType: S
        - AttributeName: sk                  # = run_date#source_id → SK range 로 "최근 N일" 질의(ISO=사전식=시간순)
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      # TTL 없음 — ledger 는 durable proprietary state(inclusion-test #2). 지우지 않는다.
      # GSI 없음 — "user X 의 최근 N일"은 base SK range 로 충분. "날짜별 전체 사용자"(cross-user)가 필요해질 때만 추가.

  # ── source-store: 권위 페치 정본(raw text·url·title·media·date). source-of-record = 토대. ──
  SourceStoreTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}-source-store'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: source_id          # = sha256(normalize(text)) → content-addressed, 자동 dedup
          AttributeType: S
      KeySchema:
        - AttributeName: source_id
          KeyType: HASH
      TimeToLiveSpecification:               # 원문(저작권 민감) 7일 ephemeral — corpus 아님. ledger 가 source_id+headline 보존(앵커 유지).
        AttributeName: ttl
        Enabled: true
      # 전문(상한 8000자) 저장 — DDB 400KB 한도 밑. 그 이상 긴 기사면 S3(blob)+여기(포인터) 분리(인터페이스 동일).

  # ── users: per-user 프로필(구독). PK=user_id. ④ Web UI(PUT /profile) 쓰기 ↔ load_user 읽기 seam(H4). ──
  UsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain          # durable — 스택을 지워도 유저 프로필은 보존
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${TablePrefix}-users'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:   # 우발적 쓰기/삭제/손상 복구(연속 백업, 최근 35일)
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: user_id             # 데모=gonsoo · 공개=Cognito sub
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      # TTL 없음 — 유저 프로필은 durable. ★ skill_md 는 *여기 없음*(파일 오버레이 — trust 경계, certifier 미열람).
      # 7 web 필드만: recipient·type·sources(List)·depth·lens·send_hour(N)·timezone. ④ 는 이 7필드만 write.

Outputs:
  CardCacheTableName:
    Description: card cache 테이블명 (env CACHE_TABLE 로 전달)
    Value: !Ref CardCacheTable
  LedgerTableName:
    Description: ledger 테이블명 (env LEDGER_TABLE 로 전달)
    Value: !Ref LedgerTable
  SourceStoreTableName:
    Description: source-store 테이블명 (env SOURCE_TABLE 로 전달)
    Value: !Ref SourceStoreTable
  UsersTableName:
    Description: users 테이블명 (env USERS_TABLE 로 전달)
    Value: !Ref UsersTable
