  # Google 공식 AI 발표 채널(Gemini 대형 발표 포함) — RSS+기사 전문 평문 200. last-verified: 2026-07-06
  # ⚠️ blog.google/products/gemini 피드와 기사 중복(월간 리캡 동시 게재 확인) → 그쪽은 의도적 미채택(카드 중복 방지).

- key: google-dev
  name: Google Developers Blog
  url: https://developers.googleblog.com/
  kind: html
  lang: en
  category: Google
  require_ai: true   # 종합 개발 블로그(Android·Chrome 등 혼재) → AI 관련만 통과(Gemini API·ADK·에이전트)
  window_hours: 48   # date-only 메타데이터(리스팅+trafilatura) — late-post 보정
  # 피드 자동발견 없음 → 리스팅+trafilatura 전문 200. last-verified: 2026-07-06
