# src/briefing/core/retrieval/catalog.yaml — 전역 vetted 출처 CATALOG.
# 추가 = 이 파일 편집 + PR 리뷰(= vetting). 임의 URL 금지(큐레이션).
# 필수: key · name · url · kind(rss|html|auto) · lang(en|ko) · category.  선택: fragile(기본 false; *진짜 차단* 출처 — 현재 없음).
#   category = 발행처(publisher/brand) 그룹 → UI 섹션 + 이메일 분야 밴드 그룹핑 키. 비어있지 않음(로더 강제).
#   ⚠️ 섹션 순서 = 이 파일의 첫 등장 순서(build_catalog 이 CATALOG 순서 보존) → 같은 발행처를 인접 배치해 순서를 통제한다.
# kind: rss=피드 직접 / html=리스팅→trafilatura 추출 / auto=피드 자동발견 후 폴백.
# ⚠️ sources._load_catalog() 가 로드 시 검증 — 형식 오류면 시작 시 크래시(silent failure 금지).
# last-verified: 2026-06-24

# ── 뉴스·미디어 ──────────────────────────────────────────────
- key: aitimes
  name: AI Times
  url: https://www.aitimes.com/rss/allArticle.xml
  kind: rss
  lang: ko
  category: 뉴스·미디어
  require_ai: true   # allArticle = 종합지 피드(지역·행정 기사 섞임) → AI 관련 기사만 통과(relevance v1)

- key: the-decoder
  name: The Decoder
  url: https://the-decoder.com/feed/
  kind: rss
  lang: en
  category: 뉴스·미디어
  # 독립 AI 전문 매체(heise medien 소속). AI-scoped(전부 AI) → require_ai 불필요.
  # robots.txt AI 봇 허용 확인(vetting 게이트). RSS 200 · fetch_clean_rss 8건 전문 추출(광고 0). last-verified: 2026-07-08

# ── AWS (Amazon) ─────────────────────────────────────────────
- key: aws-ml
  name: AWS ML Blog
  url: https://aws.amazon.com/blogs/machine-learning/feed/
  kind: rss
  lang: en
  category: Amazon (AWS)
  homepage: https://aws.amazon.com/blogs/machine-learning/   # rss 피드 호스트(aws.amazon.com)는 회사 대문 → 실제 ML 블로그 랜딩 명시

- key: aws-kr-tech
  name: AWS Korea Tech Blog
  url: https://aws.amazon.com/ko/blogs/tech/feed/
  kind: rss
  lang: ko
  category: Amazon (AWS)
  homepage: https://aws.amazon.com/ko/blogs/tech/   # 피드 호스트=회사 대문 → 실제 KR 기술 블로그("AWS 기술 블로그") 랜딩 명시
  require_ai: true   # 종합 AWS 기술 블로그(DB·서버리스·컨테이너 등 혼재) → AI 관련만 통과. RSS 평문 200(application/rss+xml, 10 items). last-verified: 2026-07-08

- key: aws-ai-news
  name: AWS AI News
  url: https://aws.amazon.com/blogs/aws/category/artificial-intelligence/feed/
  kind: rss
  lang: en
  category: Amazon (AWS)
  homepage: https://aws.amazon.com/blogs/aws/category/artificial-intelligence/   # 피드 = AWS News Blog 의 AI 카테고리(사람용 랜딩)
  # AWS 공식 AI 제품·서비스 발표 채널(News Blog "Artificial Intelligence" 카테고리) — Bedrock·모델 출시·AgentCore·Summit.
  # 이미 AI-scoped(카테고리 필터) → require_ai 불필요. RSS 평문 200(application/rss+xml, 20 items), fetch_clean_rss 6건 추출. last-verified: 2026-07-08

# ── Anthropic ────────────────────────────────────────────────
- key: anthropic
  name: Anthropic News
  url: https://www.anthropic.com/news
  kind: html
  lang: en
  category: Anthropic
  window_hours: 48   # date-only 메타데이터(W≥U+P) — 오후 PT 발행 글 유실 보정(2026-07-11 reflect-with-claude 등 4건 실증). dedup=ledger
  # /news + 기사 본문 평문 200(robots Allow:/) → fetch_generic_html(trafilatura), fragile 아님

- key: anthropic-eng
  name: Anthropic Engineering
  url: https://www.anthropic.com/engineering
  kind: html
  lang: en
  category: Anthropic
  window_hours: 48   # date-only 메타데이터 — late-post 보정(anthropic 과 동일)
  # 공식 발표(anthropic/news)와 별개의 엔지니어링 블로그 — 리스팅+trafilatura 평문 200, fragile 아님.
  # 발행 빈도 낮음(월 단위) → 24h 윈도우 특성상 새 글 있는 날만 카드 기여(quiet source). last-verified: 2026-07-06

- key: claude-blog
  name: Claude Blog
  url: https://claude.com/blog
  kind: html
  lang: en
  category: Anthropic
  window_hours: 48   # date-only 메타데이터 — late-post 보정(claude-model-and-effort 유실 실증)
  # 공식 RSS 없음(표준 경로 404) → 리스팅+trafilatura 평문(anthropic 소스 동형, fragile 아님).
  # robots Allow:/ · 제품 아닌 공개 블로그. last-verified: 2026-07-07

# ── OpenAI ───────────────────────────────────────────────────
- key: openai
  name: OpenAI News
  url: https://openai.com/news/rss.xml
  kind: rss
  lang: en
  category: OpenAI
  # RSS 평문 200(robots Allow:/) → fragile 아님

# ── 커뮤니티 ──────────────────────────────────────────────────
- key: pytorch-kr-news
  name: PyTorch Korea 읽을거리
  url: https://discuss.pytorch.kr/c/news/14.rss
  kind: rss
  lang: ko
  category: 커뮤니티
  homepage: https://discuss.pytorch.kr/c/news/14   # rss 는 피드 URL — 사람용 랜딩 명시
  max_items: 3       # 평일 6~9건/일 자동 큐레이션(:30 정각 발행) — 브리핑 편중/비용 상한
  select: llm        # 최신순 잘림 = 고정 시간대 사각지대(실측) → Haiku pick-3(폴백=최신순)
  # Discourse news(읽을거리&정보공유) 카테고리 스코프 — qna/lounge 원천 제외. 분초 timestamp → window 24h 그대로.
  # 2차 큐레이션(커뮤니티 요약) — certifier 는 포럼 글 기준 검증. robots 일반 허용·전문 3~8k자. last-verified: 2026-07-11

