# src/briefing/core/lenses.yaml — 요약 관점(lens) 라이브러리.
# 추가 = 이 파일 편집 + PR 리뷰(= vetting). 필수: key · name · guidance.
# ★ lens 는 *편집 렌즈*(강조·어휘)만 — 검증/사실을 못 바꿈(certifier 미열람, 불변식 #4).
# 'general' 은 기본 lens(필수) — 미설정·미상 lens 의 폴백.

- key: general
  name: 일반(General)
  guidance: |
    균형 잡힌 일반 독자 관점. 특정 직군 어휘 없이.
    (분량·구조·커버리지는 base 요약 계약이 정한다 — lens 는 강조·어휘만.)

- key: researcher
  name: 연구자(Researcher)
  guidance: |
    연구자 관점. 강조: 무엇이 *학술적으로 새로운가* · 방법론/접근 · SOTA 대비 · 한계.
    어휘: 정확한 연구 용어 허용. 벤치마크·재현성·선행 연구와의 차이에 집중.

- key: engineer
  name: 엔지니어(Engineer)
  guidance: |
    엔지니어 관점. 강조: 작동 원리 · 아키텍처 · 트레이드오프 · 적용 가능성.
    어휘: 정확한 기술 용어 허용. 무엇이 *새로운가*와 *어떻게 쓰나*에 집중.

- key: business
  name: 비즈니스·경영(Business)
  guidance: |
    비즈니스·경영(의사결정자) 관점. 강조: 시장·경쟁 구도 · 자금/M&A · 채택/파트너십 ·
    전략적 영향 · 비용/매출 · 의사결정 시사점·리스크. (executive 통합)
    어휘: 시장·재무 용어, 결과·영향 중심. 누가 이기고 지나. 길이: 짧게.

# card-layering §6 후속 ⓑ (2026-07-06): AI 에이전트를 *만드는 사람* 페르소나 — 기계용 출력 아님
# (기계 소비는 lens 가 아니라 'verified claims feed' 채널로 v-next). engineer 와의 경계 명시 필수.
- key: agent-builder
  name: 에이전트 빌더(Agent Builder)
  guidance: |
    AI 에이전트를 만드는 사람(빌더) 관점. 강조: 도구 사용(tool use) · 오케스트레이션 ·
    평가(evals)·가드레일 · 컨텍스트/메모리 설계 · 운영 비용·신뢰성 · 에이전트 제품화 시사점.
    engineer 와의 경계: 일반 시스템 아키텍처가 아니라 *내 에이전트 설계·운영에 어떻게 적용되나*에 집중.
    어휘: 에이전트 생태계 용어(MCP, tool call, harness, eval 등) 허용.
