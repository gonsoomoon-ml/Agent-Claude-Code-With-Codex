# src/briefing/shared/catalog.yaml — 전역 vetted 출처 CATALOG.
# 추가 = 이 파일 편집 + PR 리뷰(= vetting). 임의 URL 금지(큐레이션).
# 필수: key · name · url · kind(rss|html|auto) · lang(en|ko).  선택: fragile(기본 false; *진짜 차단* 출처 — 현재 없음).
